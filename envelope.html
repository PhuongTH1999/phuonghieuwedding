<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Thiệp Mời Cưới</title>

  <!-- Open Graph Meta Tags for Social Media Preview -->
  <meta property="og:title" id="ogTitle" content="Thiệp Mời Cưới">
  <meta property="og:description" id="ogDescription" content="Thanh Hiếu & Hoàng Phương xin trân trọng kính mời">
  <meta property="og:image" id="ogImage" content="https://phuonghieuwedding.vercel.app/image_page/page1.png">
  <meta property="og:type" content="website">
  <meta property="og:url" id="ogUrl" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twitterTitle" content="Thiệp Mời Cưới">
  <meta name="twitter:image" id="twitterImage" content="https://phuonghieuwedding.vercel.app/image_page/page1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== LOADING SCREEN ===== */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-content {
      text-align: center;
    }

    .progress-bar {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a876, #e5d4bf);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(201, 168, 118, 0.5);
    }

    .progress-text {
      color: white;
      font-size: 48px;
      font-weight: 700;
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
    }

    .loading-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-top: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ===== INVITATION ENVELOPE ===== */
    .invitation-envelope {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: all 0.6s ease;
      opacity: 0;
      visibility: hidden;
    }

    .invitation-envelope.show {
      opacity: 1;
      visibility: visible;
    }

    .envelope-wrapper {
      perspective: 1000px;
      cursor: pointer;
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .envelope-card {
      width: 400px;
      height: 300px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      animation: floatCard 3s ease-in-out infinite;
      overflow: hidden;
      position: relative;
    }

    .envelope-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .envelope-img-1 {
      animation: fadeInOut 4s ease-in-out infinite;
    }

    .envelope-img-2 {
      animation: fadeInOut 4s ease-in-out 2s infinite reverse;
    }

    @keyframes fadeInOut {
      0%, 100% {
        opacity: 1;
      }
      45%, 55% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }

    .envelope-card.opening {
      animation: none;
      transform: translateY(-60px);
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .prompt-text {
      margin-top: 16px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(12px, 4vw, 16px);
      color: white;
      text-align: center;
    }

    @media (max-width: 768px) {
      .envelope-card {
        width: 280px;
        height: 220px;
      }

      .progress-bar {
        width: 220px;
      }

      .progress-text {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
      <div class="loading-label">Đang tạo thiệp mời...</div>
    </div>
  </div>

  <!-- INVITATION ENVELOPE -->
  <div class="invitation-envelope" id="invitationEnvelope">
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope-card" id="envelopeCard">
        <img class="envelope-img envelope-img-1" src="image_page/biathiep.png" alt="Thiệp mời cưới">
        <img class="envelope-img envelope-img-2" src="image_page/biathiep2.png" alt="Thiệp mời cưới">
      </div>
    </div>
    <div class="prompt-text">Nhấp để mở thiệp</div>
  </div>

  <script>
    // Loading elements
    const loadingScreen = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const invitationEnvelope = document.getElementById('invitationEnvelope');
    const envelopeCard = document.getElementById('envelopeCard');
    const envelopeWrapper = document.getElementById('envelopeWrapper');

    // Get URL parameters to pass through
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    let guestName = '';
    let guestName2 = '';

    // Decode Base64 guest data if present (with UTF-8 support)
    if (encodedData) {
      try {
        const decodedString = decodeURIComponent(escape(atob(encodedData)));
        const guestInfo = JSON.parse(decodedString);
        guestName = guestInfo.name || '';
        guestName2 = guestInfo.name2 || '';

        // Update page title and OG meta tags for social media preview
        const displayName = guestName2 ? `${guestName} & ${guestName2}` : guestName;
        const pageTitle = `Thiệp mời cưới - ${displayName}`;
        const ogDescription = `Thanh Hiếu & Hoàng Phương xin trân trọng kính mời ${displayName}`;

        document.getElementById('pageTitle').textContent = pageTitle;
        document.getElementById('ogTitle').setAttribute('content', pageTitle);
        document.getElementById('ogDescription').setAttribute('content', ogDescription);
        document.getElementById('twitterTitle').setAttribute('content', pageTitle);
        document.getElementById('ogUrl').setAttribute('content', window.location.href);
      } catch (e) {
        console.error('Error decoding guest data:', e);
      }
    }

    // Loading progress animation
    let progress = 0;
    const loadingInterval = setInterval(() => {
      progress += Math.random() * 30;
      if (progress > 100) progress = 100;
      progressFill.style.width = progress + '%';
      progressText.textContent = Math.floor(progress) + '%';

      if (progress === 100) {
        clearInterval(loadingInterval);
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
          invitationEnvelope.classList.add('show');
        }, 600);
      }
    }, 300);

    // Envelope click handler - redirect to image-viewer
    envelopeWrapper.addEventListener('click', () => {
      envelopeCard.classList.add('opening');
      setTimeout(() => {
        let redirectUrl = 'image-viewer.html';

        if (guestName) {
          // Pass guest names via URL
          redirectUrl += `?guest=${encodeURIComponent(guestName)}`;
          if (guestName2) {
            redirectUrl += `&guest2=${encodeURIComponent(guestName2)}`;
          }
        }

        console.log('Redirect URL:', redirectUrl);
        window.location.href = redirectUrl;
      }, 600);
    });
  </script>
</body>
</html>
