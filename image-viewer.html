<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xem Thiệp Mời</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1129px;
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(to right, #f9dce5 0%, #f2f1f6 100%);
      color: rgb(173, 2, 9);
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(36px, 7vw, 56px);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .header p {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(16px, 4.5vw, 28px);
      opacity: 0.9;
      font-weight: 600;
    }

    .images-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .image-item {
      width: 100%;
      overflow: hidden;
      /* background: #f5f3f0; */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      position: relative;
    }

    .image-item3 {
      width: 100%;
      overflow: hidden;
      /* background: #f5f3f0; */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      position: relative;
    }

    .image-text {
   position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:flex-end;

    padding-bottom:7%;

    transform:translateX(6%);
    font-family: 'Great Vibes', cursive;
      font-size: clamp(16px, 4.5vw, 44px);
      color: #A91D3A;
      font-weight: 600;
      z-index: 10;
    }

    .image-text3 {
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding-top:29%;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(16px, 4.5vw, 44px);
      color: #A91D3A;
      font-weight: 600;
      z-index: 10;
    }

    .image-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .image-label {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .image-download-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(201, 168, 118, 0.9);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .image-download-btn:hover {
      background: rgba(201, 168, 118, 1);
      transform: scale(1.05);
    }

    .image-item {
      position: relative;
    }

    .footer {
      background: #f5f3f0;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #e8e3dd;
    }

    .footer p {
      font-size: 12px;
      color: #7a7a7a;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .header {
        padding: 20px 16px;
      }

      .image-item {
        min-height: 250px;
      }
    }

    /* Loading animation */
    .image-item img {
      animation: fadeIn 0.6s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Thiệp Cưới</h1>
      <p>Hoàng Phương & Thanh Hiếu • 09.08.2026</p>
    </div>

    <div class="images-wrapper">
      <!-- Page 1 -->
      <div class="image-item">
        <img src="image_page/page1.png" alt="Trang 1">
        <div class="image-text" id="text1"></div>
        <!-- <button class="image-download-btn" data-page="1">Tải ảnh</button> -->
      </div>

      <!-- Page 2 -->
      <div class="image-item">
        <img src="image_page/page2.png" alt="Trang 2">
        <!-- <div class="image-text" id="text2"></div> -->
      </div>

      <!-- Page 3 -->
      <div class="image-item">
        <img src="image_page/page3.png" alt="Trang 3">
        <div class="image-text3" id="text3"></div>
      </div>
    </div>

    <div class="footer">
      <p>Cảm ơn vì đã là một phần trong ngày vui của chúng mình 💕</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    // Get guest names from URL parameters or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    const guestId = urlParams.get('id');
    const guestFromUrl = urlParams.get('guest');
    const guest2FromUrl = urlParams.get('guest2');

    let guestName = '';
    let guestName2 = '';

    // If using new ID system
    if (guestId) {
      const guests = JSON.parse(localStorage.getItem('guests') || '[]');
      const guest = guests.find(g => g.id === parseInt(guestId));
      if (guest) {
        guestName = guest.name;
        guestName2 = guest.name2;
      }
    } else {
      // Get from URL params
      guestName = guestFromUrl || '';
      guestName2 = guest2FromUrl || '';
    }

    // Populate text on images
    if (guestName) {
      document.getElementById('text1').textContent = guestName;
    }
    if (guestName2) {
      document.getElementById('text3').textContent = guestName2;
    }

    // Handle download image with text overlay
    document.querySelectorAll('.image-download-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.preventDefault();
        const page = btn.getAttribute('data-page');
        const imageItem = btn.closest('.image-item');
        const img = imageItem.querySelector('img');
        const textOverlay = imageItem.querySelector('.image-text, .image-text3');

        try {
          btn.textContent = 'Đang xử lý...';
          btn.disabled = true;

          // Create new image object to get dimensions
          const newImg = new Image();
          newImg.crossOrigin = 'anonymous';
          newImg.onload = () => {
            // Create canvas with image dimensions
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = newImg.width;
            canvas.height = newImg.height;

            // Draw image on transparent background
            ctx.drawImage(newImg, 0, 0);

            // Draw text overlay if exists
            if (textOverlay && textOverlay.textContent) {
              const fontSize = window.getComputedStyle(textOverlay).fontSize;
              const fontFamily = window.getComputedStyle(textOverlay).fontFamily;
              const color = window.getComputedStyle(textOverlay).color;
              const textContent = textOverlay.textContent;

              ctx.font = `600 ${fontSize} ${fontFamily}`;
              ctx.fillStyle = color;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';

              // Calculate position (roughly center bottom or based on original positioning)
              const x = canvas.width / 2;
              const y = canvas.height * (page === '3' ? 0.3 : 0.9);

              ctx.fillText(textContent, x, y);
            }

            // Download
            canvas.toBlob((blob) => {
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = `thiep-cuoi-page${page}-${guestName || 'guest'}.png`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);

              btn.textContent = 'Tải ảnh';
              btn.disabled = false;
            }, 'image/png');
          };
          newImg.src = img.src;
        } catch (err) {
          console.error('Download failed:', err);
          btn.textContent = 'Lỗi!';
          setTimeout(() => {
            btn.textContent = 'Tải ảnh';
            btn.disabled = false;
          }, 2000);
        }
      });
    });
  </script>
</body>
</html>
