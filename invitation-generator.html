<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Thiệp Mời Cưới</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&family=Allura&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a876;
      --gold-dark: #a68157;
      --dark: #1f1f1f;
      --light: #fafaf8;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
      overflow: hidden;
    }

    /* ===== LOADING SCREEN ===== */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-content {
      text-align: center;
    }

    .progress-bar {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #e5d4bf);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(201, 168, 118, 0.5);
    }

    .progress-text {
      color: white;
      font-size: 48px;
      font-weight: 700;
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
    }

    .loading-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-top: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ===== INVITATION CARD (ENVELOPE) ===== */
    .invitation-envelope {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: all 0.6s ease;
      opacity: 0;
      visibility: hidden;
    }

    .invitation-envelope.show {
      opacity: 1;
      visibility: visible;
    }

    .envelope-wrapper {
      perspective: 1000px;
      cursor: pointer;
      position: relative;
    }

    .envelope-card {
      width: 400px;
      height: 300px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      animation: floatCard 3s ease-in-out infinite;
    }

    .envelope-card.opening {
      animation: none;
      transform: translateY(-60px);
    }

    @keyframes floatCard {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .envelope-title {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      color: var(--dark);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .envelope-subtitle {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .envelope-message {
      font-size: 15px;
      color: #7a7a7a;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .envelope-hint {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 1px;
      font-weight: 600;
      margin-top: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.7;
      }
      50% {
        opacity: 1;
      }
    }

    .envelope-decoration {
      position: absolute;
      font-size: 24px;
      animation: float 3s ease-in-out infinite;
    }

    .decoration-1 {
      top: -20px;
      left: -30px;
      animation-delay: 0s;
    }

    .decoration-2 {
      bottom: -20px;
      right: -30px;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    /* ===== INVITATION CARDS CONTAINER ===== */
    .invitations-container {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s ease;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .invitations-container.show {
      opacity: 1;
      visibility: visible;
    }

    .invitations-header {
      position: absolute;
      top: 40px;
      color: white;
      text-align: center;
      z-index: 10;
    }

    .invitations-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      margin-bottom: 8px;
      color: var(--gold);
    }

    .invitations-header p {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    .invitations-scroll {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 30px 40px 100px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .invitations-track {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: scroll;
      scroll-snap-type: none;
      max-height: calc(100vh - 120px);
      width: 100%;
      max-width: 1000px;
      padding: 0;
      overflow-x: hidden;
      scrollbar-width: none;
      margin: 0 auto;
      align-items: center;
    }

    .invitations-track::-webkit-scrollbar {
      display: none;
    }

    .invitations-track::-webkit-scrollbar {
      width: 6px;
    }

    .invitations-track::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .invitations-track::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 3px;
    }

    .invitation-item {
      position: relative;
    }

    /* ===== BOTTOM BUTTONS ===== */
    .invitations-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      padding: 20px 40px;
      width: 100%;
      background: linear-gradient(180deg, rgba(45, 45, 45, 0.8) 0%, rgba(31, 31, 31, 0.95) 100%);
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    .btn-primary,
    .btn-secondary {
      flex: 1;
      max-width: 250px;
      padding: 14px 28px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
    }

    .btn-primary {
      background: var(--gold);
      color: white;
      box-shadow: 0 4px 15px rgba(201, 168, 118, 0.3);
    }

    .btn-primary:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 168, 118, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 2px solid var(--gold);
    }

    .btn-secondary:hover {
      background: var(--gold);
      color: white;
      transform: translateY(-2px);
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1001;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 40px 50px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #999;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--dark);
    }

    .modal-body {
      text-align: center;
    }

    .modal-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: var(--dark);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .modal-body p {
      font-size: 15px;
      color: #7a7a7a;
      line-height: 1.6;
    }

    .invitation-item.card-1 {
      background: url('image_page/page1.png');
      background-size: contain;
      width: 100%;
      aspect-ratio: 1477 / 1065;
      /*border-radius: 12px;*/
      padding: 40px 0 0 0;
      position: relative;
    }

    .invitation-item.card-2 {
      background: url('image_page/page2.png');
      background-size: contain;
      width: 100%;
      aspect-ratio: 1050 / 1498;
      padding: 0;
    }

    .invitation-item.card-3 {
      background: url('image_page/page3.png');
      background-size: contain;
      width: 100%;
      aspect-ratio: 1054 / 1492;
      padding: 0 0 40px 0;
      /*margin-bottom: calc(80px + 20px);*/
    }

    /* ===== CARDS 2-3 WRAPPER ===== */
    .cards-2-3-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 90%;
      max-width: 900px;
      flex-shrink: 0;
      margin: 6px auto;
    }

    .cards-2-3-wrapper .invitation-item {
      width: 100%;
    }

    /* ===== CARD 1 BOTTOM TEXT ===== */
    .card-1-bottom-text {
      position: absolute;
      bottom: 6%;
      left: 55%;
      transform: translateX(-50%);
      width: 50%;
      height: auto;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-radius: 4px;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 400;
      color: #A91D3A;
      text-align: center;
      white-space: nowrap;
    }

    /* ===== CARD 3 BOTTOM TEXT ===== */
    .card-3-bottom-text {
      position: absolute;
      top: 19.5%;
      left: 55%;
      transform: translateX(-50%);
      width: 50%;
      height: auto;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-radius: 4px;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 400;
      color: #A91D3A;
      text-align: center;
      white-space: nowrap;
    }

    /* ===== CARD CONTENT REMOVED ===== */
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .date-time-value {
      color: var(--dark);
      font-size: 18px;
      font-weight: 600;
      margin-top: 4px;
    }

    .note-text {
      font-size: 12px;
      color: #7a7a7a;
      font-style: italic;
      margin-top: 10px;
    }

    .close-btn {
      position: fixed;
      top: 40px;
      right: 40px;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 1001;
      backdrop-filter: blur(10px);
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
    }

    .close-btn.hidden {
      display: none;
    }

    /* ===== RESPONSIVE ===== */
    /* ===== TABLET / 1024px LAYOUT ===== */
    @media (max-width: 1024px) {
      .cards-2-3-wrapper {
        grid-template-columns: 1fr;
        width: 100%;
        max-width: 600px;
      }
    }

    /* ===== TABLET 600-768px LAYOUT ===== */
    @media (max-width: 768px) and (min-width: 600px) {
      .invitations-scroll {
        padding: 20px 20px 100px 20px !important;
      }

      .invitations-track {
        width: 100%;
        max-width: 100%;
      }

      .cards-2-3-wrapper {
        width: 100%;
        max-width: 100%;
        margin: 6px auto;
      }

      .invitation-item.card-1 {
        width: 100%;
        padding: 30px 0 0 0;
      }

      .invitation-item.card-2,
      .invitation-item.card-3 {
        width: 100%;
      }
    }

    /* ===== MOBILE LAYOUT ===== */
    @media (max-width: 768px) {
      /* ===== ENVELOPE & LOADING ===== */
      .envelope-card {
        width: 280px;
        height: 220px;
        padding: 28px 20px;
      }

      .envelope-title {
        font-size: 28px;
      }

      .envelope-subtitle {
        font-size: 10px;
      }

      .envelope-message {
        font-size: 13px;
      }

      .envelope-hint {
        font-size: 12px;
      }

      .progress-bar {
        width: 220px;
      }

      .progress-text {
        font-size: 32px;
      }

      .loading-label {
        font-size: 12px;
      }

      /* ===== INVITATION ITEMS ===== */
      .invitation-item {
        width: 100vw;
        padding: 0;
        border-radius: 0;
        box-shadow: none;
        margin: 0;
      }

      .invitation-item.card-1 {
        width: 100vw;
        aspect-ratio: 1477 / 1065;
        padding: 30px 0 0 0;
        /*margin: 18px 0 0 0;*/
      }

      .invitation-item.card-2 {
        width: 100vw;
        aspect-ratio: 1050 / 1498;
      }

      .invitation-item.card-3 {
        width: 100vw;
        aspect-ratio: 1054 / 1492;
        padding: 0 0 30px 0;
      }

      .cards-2-3-wrapper {
        display: grid;
        grid-template-columns: 1fr;
        width: 100vw;
        /*gap: 0;*/
        margin: 0;
      }

      .cards-2-3-wrapper .invitation-item {
        width: 100vw;
      }

      /* ===== CARD 1 ===== */
      .card-1-content {
        padding: 30px 16px;
      }

      .card-1-top {
        padding-top: 5px;
      }

      .card-1-bottom {
        padding: 15px 16px 10px;
      }

      .couple-title {
        gap: 15px;
        margin-bottom: 15px;
      }

      .couple-col-role {
        font-size: 10px;
        margin-bottom: 6px;
      }

      .couple-col-name {
        font-size: 18px;
      }

      .couple-divider-v {
        height: 35px;
      }

      .card-1-title {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .card-1-subtitle {
        font-size: 12px;
        margin-bottom: 12px;
      }

      .card-1-guest {
        font-size: 13px;
      }

      /* ===== CARD 2 ===== */
      .card-2-content {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        padding: 25px 16px;
        gap: 0;
      }

      .card-2-left {
        grid-column: 1;
        grid-row: 1;
        padding: 15px;
        border-right: none;
        border-bottom: 1px solid var(--gold);
        width: 100%;
        overflow: visible;
      }

      .card-2-right {
        grid-column: 1;
        grid-row: 2;
        padding: 15px;
        border-left: none;
        border-top: 1px solid var(--gold);
        width: 100%;
        overflow: visible;
      }

      .card-2-left .couple-title {
        margin-bottom: 12px;
        padding-bottom: 10px;
        gap: 10px;
      }

      .couple-col {
        text-align: center;
      }

      .couple-col-role {
        font-size: 9px;
        margin-bottom: 4px;
      }

      .couple-col-name {
        font-size: 14px;
        font-weight: 600;
      }

      .couple-divider-v {
        width: 1px;
        height: 30px;
      }

      .card-2-section {
        margin-bottom: 10px;
      }

      .card-2-section-title {
        font-size: 9px;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }

      .card-2-section-content {
        font-size: 11px;
        line-height: 1.5;
        word-break: break-word;
      }

      .family-info {
        font-size: 10px;
        margin-bottom: 3px;
        word-break: break-word;
      }

      .family-label {
        display: inline;
        font-weight: 600;
      }

      .date-time {
        font-size: 11px;
        grid-template-columns: auto auto auto;
        gap: 8px;
      }

      .date-time-item {
        text-align: center;
      }

      .date-time-label {
        font-size: 8px;
      }

      .date-time-value {
        font-size: 14px;
      }

      .note-text {
        font-size: 9px;
      }

      /* ===== CARD 3 ===== */
      .card-3-content {
        padding: 25px 16px;
      }

      .card-3-left {
        padding: 0;
        width: 100%;
      }

      .card-3-section {
        margin-bottom: 10px;
      }

      .card-3-section-title {
        font-size: 9px;
        margin-bottom: 5px;
      }

      .card-3-section-content {
        font-size: 11px;
        line-height: 1.5;
        word-break: break-word;
      }

      .venue-detail {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .note-text {
        font-size: 9px;
      }

      /* ===== SCROLL CONTAINER ===== */
      .invitations-scroll {
        padding-top: 0 !important;
        padding-right: 0 !important;
        padding-bottom: 80px !important;
        padding-left: 0 !important;
      }

      .invitations-container {
        padding: 0 !important;
      }

      .invitations-track {
        gap: 12px;
        padding: 0 0 20px 0;
        width: 100vw;
        /*max-height: calc(100vh - 180px);*/
        overflow-x: hidden;
        overflow-y: scroll;
        scrollbar-width: none;
      }

      .invitations-track::-webkit-scrollbar {
        display: none;
      }

      .invitation-item {
        margin: 6px 0;
      }

      .invitations-header {
        top: 15px;
      }

      .invitations-header h2 {
        font-size: 24px;
      }

      .invitations-header p {
        font-size: 10px;
      }

      .close-btn {
        top: 15px;
        right: 15px;
        width: 38px;
        height: 38px;
        font-size: 22px;
      }

      /* ===== BOTTOM BUTTONS MOBILE ===== */
      .invitations-buttons {
        flex-direction: column;
        gap: 12px;
        padding: 16px 16px;
        bottom: 0;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        max-width: none;
        padding: 12px 20px;
        font-size: 13px;
      }

      .invitations-scroll {
        padding: 20px 0 120px;
      }

      .invitation-item.card-3 {
        /*margin-bottom: calc(70px + 20px);*/
      }
    }
  </style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
      <div class="loading-label">Đang tạo thiệp mời...</div>
    </div>
  </div>

  <!-- INVITATION ENVELOPE -->
  <div class="invitation-envelope" id="invitationEnvelope">
    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope-card" id="envelopeCard">
        <div class="envelope-decoration decoration-1">💌</div>
        <div class="envelope-decoration decoration-2">💒</div>
        <div class="envelope-subtitle">Trân trọng kính mời</div>
        <div class="envelope-title">Thanh Hiếu & Hoàng Phương</div>
        <div class="envelope-message">Chúng tôi rất vui mừng được chia sẻ những khoảnh khắc đặc biệt này cùng bạn</div>
        <div class="envelope-hint">↓ Nhấn để mở thiệp ↓</div>
      </div>
    </div>
  </div>

<!--  &lt;!&ndash; CLOSE BUTTON &ndash;&gt;-->
<!--  <button class="close-btn hidden" id="closeBtn">&times;</button>-->

  <!-- INVITATIONS CONTAINER -->
  <div class="invitations-container" id="invitationsContainer">
<!--    <div class="invitations-header">-->
<!--      <h2>Thiệp Mời Cưới</h2>-->
<!--      <p>Thanh Hiếu & Hoàng Phương</p>-->
<!--    </div>-->
    <div class="invitations-scroll">
      <div class="invitations-track">
        <!-- CARD 1 -->
        <div class="invitation-item card-1">
          <div class="card-1-bottom-text" id="guestNameDisplay">
            <div></div>
          </div>
        </div>

        <!-- CARDS 2-3 CONTAINER -->
        <div class="cards-2-3-wrapper">
          <!-- CARD 2 -->
          <div class="invitation-item card-2"></div>

        <!-- CARD 3 -->
        <div class="invitation-item card-3">
          <div class="card-3-bottom-text" id="guestName2Display">
            <div></div>
          </div>
        </div>
        <!-- END CARDS 2-3 CONTAINER -->
      </div>
    </div>

<!--    &lt;!&ndash; BOTTOM BUTTONS &ndash;&gt;-->
<!--    <div class="invitations-buttons">-->
<!--      <button class="btn-primary" id="confirmBtn">Xác nhận tham dự</button>-->
<!--      <button class="btn-secondary" id="infoBtn">Thông Tin cưới</button>-->
<!--    </div>-->
  </div>

  <!-- COMING SOON MODAL -->
  <div class="modal" id="comingSoonModal">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">&times;</span>
      <div class="modal-body">
        <h2>Coming Soon</h2>
        <p>Tính năng này sẽ ra mắt sớm! 🎉</p>
      </div>
    </div>
  </div>

  <script>
    // Check for guest URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const guestFromUrl = urlParams.get('guest');
    const guest2FromUrl = urlParams.get('guest2');

    // Loading progress
    const loadingScreen = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const envelopeCard = document.getElementById('envelopeCard');
    const envelopeWrapper = document.getElementById('envelopeWrapper');
    const invitationEnvelope = document.getElementById('invitationEnvelope');
    const invitationsContainer = document.getElementById('invitationsContainer');
    const closeBtn = document.getElementById('closeBtn');

    // Save guest names from URL
    if (guestFromUrl) {
      localStorage.setItem('guestName', guestFromUrl);
    }
    if (guest2FromUrl) {
      localStorage.setItem('guestName2', guest2FromUrl);
    }

    // Loading progress animation (always show, regardless of source)
    let progress = 0;
    const loadingInterval = setInterval(() => {
      progress += Math.random() * 30;
      if (progress > 100) progress = 100;
      progressFill.style.width = progress + '%';
      progressText.textContent = Math.floor(progress) + '%';

      if (progress === 100) {
        clearInterval(loadingInterval);
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
          invitationEnvelope.classList.add('show');
        }, 600);
      }
    }, 300);

    // Populate guest names
    const guestNameDisplay = document.getElementById('guestNameDisplay');
    const guestName = guestFromUrl || localStorage.getItem('guestName') || 'Quý Khách';
    if (guestNameDisplay) {
      guestNameDisplay.querySelector('div').textContent = guestName;
    }

    // Populate second guest name on page 3
    const guestName2 = guest2FromUrl || localStorage.getItem('guestName2') || '';
    const guestName2Display = document.getElementById('guestName2Display');
    if (guestName2Display && guestName2) {
      guestName2Display.querySelector('div').textContent = guestName2;
    }

    // Envelope click handler
    envelopeWrapper.addEventListener('click', () => {
      envelopeCard.classList.add('opening');
      setTimeout(() => {
        invitationEnvelope.classList.remove('show');
        invitationsContainer.classList.add('show');
        closeBtn.classList.remove('hidden');
      }, 600);
    });

    // Close button handler
    closeBtn.addEventListener('click', () => {
      invitationsContainer.classList.remove('show');
      invitationEnvelope.classList.add('show');
      envelopeCard.classList.remove('opening');
      closeBtn.classList.add('hidden');

      // Reset envelope card
      setTimeout(() => {
        envelopeCard.style.animation = 'floatCard 3s ease-in-out infinite';
      }, 300);
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && invitationsContainer.classList.contains('show')) {
        closeBtn.click();
      }
    });

    // Modal handlers
    const confirmBtn = document.getElementById('confirmBtn');
    const infoBtn = document.getElementById('infoBtn');
    const modal = document.getElementById('comingSoonModal');
    const modalClose = document.getElementById('modalClose');

    confirmBtn.addEventListener('click', () => {
      modal.classList.add('show');
    });

    infoBtn.addEventListener('click', () => {
      modal.classList.add('show');
    });

    modalClose.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('show');
      }
    });
  </script>

</body>
</html>
